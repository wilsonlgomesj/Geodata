.bg{background:transparent;color:#8B949E;border:1px solid #21262D}.bg:hover{color:#E6EDF3;border-color:#30363D}
.bd{background:#F8514920;color:#F85149;border:1px solid #F8514930}
.tw{width:100%;border-collapse:collapse;font-size:12px}
th{padding:10px 14px;text-align:left;color:#8B949E;font-weight:600;letter-spacing:.04em;font-size:11px;text-transform:uppercase;white-space:nowrap;border-bottom:1px solid #21262D}
td{padding:11px 14px;border-bottom:1px solid #21262D}

.pill.act{border-color:#F0A500;background:#F0A50020;color:#F0A500;font-weight:600}
.pill:hover{color:#E6EDF3;border-color:#30363D}
.mb{width:100%;height:4px;background:#21262D;border-radius:2px;overflow:hidden;margin-top:4px}
.mf{height:100%;border-radius:2px;transition:width .4s ease}
.pc{padding:28px}
.kg{display:grid;gap:12px;margin-bottom:24px}
.st{font-size:13px;font-weight:700;color:#E6EDF3;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.mono{font-family:'IBM Plex Mono',monospace}

.ir{display:flex;justify-content:space-between;margin-bottom:8px;font-size:12px}

.au-ov{position:absolute;right:0;top:0;bottom:0;background:rgba(255,215,0,.4)}
.3col{display:grid;grid-template-columns:160px 1fr 260px;gap:20px}
.2col{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.ai{border-radius:8px;padding:12px 14px;border-left:3px solid;margin-bottom:8px}
.am{font-size:12px;color:#E6EDF3;margin-bottom:4px;line-height:1.5}
.at{font-size:10px;color:#484F58}
</style>
</head>

// ── LOGGING ──
function rLog(){
  const h=hole||DH[0];
  const td=h.depth||312.5;
  const maxAu=Math.max(...IV.filter(r=>r.au).map(r=>r.au));
  const tabs=[{id:"lithology",l:"Litologia"},{id:"alteration",l:"Alteração"},{id:"mineralization",l:"Mineralização"},{id:"assay",l:"Ensaios"},{id:"recovery",l:"Recuperação/RQD"}];

  const profile=IV.map(iv=>{
    const hp=Math.max(18,((iv.to-iv.from)/td)*400);
    const col=LC[iv.litho]||"#888";
    const aw=iv.au?Math.min(40,(iv.au/maxAu)*40):0;
    return`<div class="litho-seg"><div class="litho-d">${iv.from}</div><div class="litho-b" style="height:${hp}px;background:${col}" title="${iv.from}-${iv.to}m: ${iv.litho}">${aw>0?`<div class="au-ov" style="width:${aw}%"></div>`:""}</div></div>`;
  }).join("")+`<div class="litho-seg"><div class="litho-d">${td}</div></div>`;

  const leg=Object.entries(LC).map(([n,c])=>`<div style="display:flex;align-items:center;gap:6px;margin-bottom:5px"><div style="width:11px;height:11px;background:${c};border-radius:2px;flex-shrink:0"></div><span style="font-size:10px;color:#8B949E">${n}</span></div>`).join("");

  const ch=logTab==="lithology"?"Litologia":logTab==="alteration"?"Alteração":logTab==="mineralization"?"Mineralização":logTab==="assay"?"Au (g/t)":"Recup. %";

  const rows=IV.map(iv=>{
    let c4="";
    if(logTab==="lithology"){const col=LC[iv.litho]||"#888";c4=`<div style="display:flex;align-items:center;gap:8px"><div style="width:10px;height:10px;background:${col};border-radius:2px;flex-shrink:0"></div><span>${iv.litho}</span></div>`;}
    else if(logTab==="alteration")c4=`<span>${iv.alt}</span>`;
    else if(logTab==="mineralization")c4=`<span style="color:${iv.min!=="—"?"#E3B341":"#484F58"}">${iv.min}</span>`;
    else if(logTab==="assay")c4=`<span class="mono" style="color:${auc(iv.au)};font-weight:${iv.au&&iv.au>1?700:400}">${iv.au?iv.au.toFixed(2):"—"}</span>`;
    else c4=`<div><span class="mono" style="color:${iv.rec>90?"#3FB950":iv.rec>75?"#E3B341":"#F85149"}">${iv.rec}%</span>${mb(iv.rec,iv.rec>90?"#3FB950":iv.rec>75?"#E3B341":"#F85149")}</div>`;
    const c5=logTab==="recovery"?`<span class="mono" style="color:#8B949E">${iv.rqd>0?iv.rqd:"—"}</span>`:`<span class="mono" style="color:#58A6FF;font-size:11px">${iv.smp||"—"}</span>`;
    return`<tr><td class="mono" style="color:#8B949E">${iv.from.toFixed(1)}</td><td class="mono" style="color:#8B949E">${iv.to.toFixed(1)}</td><td class="mono" style="font-weight:600">${(iv.to-iv.from).toFixed(1)}</td><td>${c4}</td><td>${c5}</td><td style="color:#484F58;cursor:pointer">›</td></tr>`;
  }).join("");

  const avgR=Math.round(IV.reduce((a,r)=>a+r.rec,0)/IV.length);
  const avgA=(IV.filter(r=>r.au).reduce((a,r)=>a+r.au,0)/IV.filter(r=>r.au).length).toFixed(2);

  return`
  ${tb(`Logging — ${h.name}`,`Az ${h.az}° / Dip ${h.dip}° · ${td}m · Serra Dourada`,btn("Exportar","g","export")+btn("Novo Intervalo","p","plus"))}
  <div style="border-bottom:1px solid #21262D;background:#0D1117;padding:0 28px;display:flex">
    ${tabs.map(t=>`<button class="tab-btn ${logTab===t.id?"act":""}" onclick="setLT('${t.id}')">${t.l}</button>`).join("")}
  </div>
  <div class="pc">
    <div style="display:grid;grid-template-columns:160px 1fr 260px;gap:20px">
      <div>
        <div style="font-size:11px;color:#8B949E;text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px">Perfil Visual</div>
        ${profile}
        <div style="margin-top:16px">${leg}<div style="margin-top:10px;padding-top:8px;border-top:1px solid #21262D"><div style="display:flex;align-items:center;gap:6px"><div style="width:11px;height:11px;background:rgba(255,215,0,.5);border-radius:2px"></div><span style="font-size:10px;color:#8B949E">Au &gt; 1 g/t</span></div></div></div>
      </div>
      <div>
        <div class="tw-wrap">
          <table class="tw"><thead><tr><th>De(m)</th><th>Para(m)</th><th>Int.</th><th>${ch}</th><th>${logTab==="recovery"?"RQD":"Amostra"}</th><th></th></tr></thead>
          <tbody>${rows}</tbody></table>
        </div>
        <div style="display:flex;gap:18px;margin-top:10px;font-size:11px;color:#8B949E;flex-wrap:wrap">
          <span>12 intervalos · ${td}m</span><span>Rec. média: ${avgR}%</span><span>Au máx: ${maxAu.toFixed(2)} g/t</span>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:14px">
        <div class="card">
          <div style="font-size:11px;color:#8B949E;text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px">Collar</div>
          ${[["Furo",h.name],["Este (X)",h.x.toFixed(1)],["Norte (Y)",h.y.toFixed(1)],["Cota (Z)",h.z.toFixed(1)],["Azimute",`${h.az}°`],["Mergulho",`${h.dip}°`],["Prof. Final",`${td}m`]].map(([k,v])=>`<div class="ir"><span class="ik">${k}</span><span class="iv">${v}</span></div>`).join("")}
        </div>
        <div class="card">
          <div style="font-size:11px;color:#8B949E;text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px">Resumo Au</div>
          ${[["Au máx.",`${maxAu.toFixed(2)} g/t`,auc(maxAu)],["Au médio",`${avgA} g/t`,"#E6EDF3"],["Interceptos >1g/t",`${IV.filter(r=>r.au>1).length}`,"#F0A500"],["Interceptos >0.3g/t",`${IV.filter(r=>r.au>0.3).length}`,"#E3B341"]].map(([k,v,c])=>`<div class="ir"><span class="ik">${k}</span><span class="iv" style="color:${c};font-weight:600">${v}</span></div>`).join("")}
        </div>
        <div class="card">
          <div style="font-size:11px;color:#8B949E;text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px">Status</div>
          ${[["Litologia",h.litho,"Completo","Pendente"],["Amostragem",true,"Completo","Pendente"],["Ensaios",h.assay,"Aprovado","Aguardando"],["QA/QC",h.qaqc==="Aprovado",h.qaqc,"Pendente"]].map(([k,ok,y,n])=>`<div class="ir"><span class="ik">${k}</span><span style="color:${ok?"#3FB950":"#E3B341"}">${ok?y:n}</span></div>`).join("")}
        </div>
      </div>
    </div>
  </div>`;
}

function drawMap(){
  const c=document.getElementById("mc");
  if(!c)return;
  c.width=680;c.height=480;
  const x=c.getContext("2d");
  const W=c.width,H=c.height;
  x.fillStyle="#0D1117";x.fillRect(0,0,W,H);
  x.strokeStyle="#1C2330";x.lineWidth=0.5;
  for(let i=0;i<W;i+=40){x.beginPath();x.moveTo(i,0);x.lineTo(i,H);x.stroke();}
  for(let i=0;i<H;i+=40){x.beginPath();x.moveTo(0,i);x.lineTo(W,i);x.stroke();}
  x.strokeStyle="#21262D80";x.lineWidth=1;
  for(let i=0;i<5;i++){x.beginPath();x.arc(W/2+20,H/2-10,60+i*45,0,Math.PI*2);x.stroke();}
  const holes=[
    {px:W/2-60,py:H/2+20,name:"SRD-001",st:"Completo",au:8.72},
    {px:W/2-10,py:H/2-10,name:"SRD-002",st:"Completo",au:2.14},
    {px:W/2+40,py:H/2-35,name:"SRD-003",st:"Em andamento",au:null},
    {px:W/2+90,py:H/2-60,name:"SRD-004",st:"Planejado",au:null},
    {px:W/2+140,py:H/2-80,name:"SRD-005",st:"Completo",au:4.18}
  ];
  holes.forEach(h=>{
    const col=h.st==="Completo"?"#3FB950":h.st==="Em andamento"?"#F0A500":"#58A6FF";
    x.beginPath();x.arc(h.px,h.py,10,0,Math.PI*2);x.fillStyle=col+"25";x.fill();
    x.beginPath();x.arc(h.px,h.py,7,0,Math.PI*2);x.strokeStyle=col;x.lineWidth=1.5;x.stroke();
    x.beginPath();x.arc(h.px,h.py,4,0,Math.PI*2);
    x.fillStyle=h.au&&h.au>1?"#FFD700":col;x.fill();
    x.fillStyle="#E6EDF3";x.font="bold 10px 'IBM Plex Mono',monospace";
    x.fillText(h.name,h.px+12,h.py+4);
    if(h.au){x.fillStyle="#F0A500";x.font="9px 'IBM Plex Mono',monospace";x.fillText(h.au+" g/t",h.px+12,h.py+14);}
  });
  x.beginPath();x.setLineDash([4,4]);x.strokeStyle="#F0A50055";x.lineWidth=1;
  x.ellipse(W/2+40,H/2-30,115,72,-0.3,0,Math.PI*2);x.stroke();x.setLineDash([]);
  x.fillStyle="#F0A500";x.font="bold 10px 'IBM Plex Mono'";x.fillText("ALVO A",W/2+110,H/2-95);
  x.fillStyle="#E6EDF3";x.font="bold 12px Arial";x.fillText("N",W-40,28);
  x.beginPath();x.moveTo(W-34,34);x.lineTo(W-34,58);x.strokeStyle="#E6EDF3";x.lineWidth=1.5;x.stroke();
  x.beginPath();x.moveTo(W-39,41);x.lineTo(W-34,34);x.lineTo(W-29,41);x.fillStyle="#E6EDF3";x.fill();
  x.strokeStyle="#484F58";x.lineWidth=1;
  x.beginPath();x.moveTo(40,H-28);x.lineTo(140,H-28);x.stroke();
  x.fillStyle="#484F58";x.font="10px Arial";x.fillText("0",38,H-16);x.fillText("500m",118,H-16);
}
